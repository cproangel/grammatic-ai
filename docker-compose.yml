# Grammatic Docker Configuration
# ================================
# Frontend:  http://localhost:8080
# Backend:   http://localhost:8003
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose down           # Stop all services
#   docker-compose logs -f        # View logs
#   docker-compose restart        # Restart all
#   docker-compose up -d --build  # Rebuild and start
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grammatic-backend
    ports:
      - "8003:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - grammatic-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grammatic-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - grammatic-network
networks:
  grammatic-network:
    driver: bridge
